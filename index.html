<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PuckCooks | Feed Your Family</title>
    <link href="https://fonts.googleapis.com/css2?family=New+Rocker&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --puck-orange: #ff4d00;
            --puck-fire: #ff2200;
            --puck-black: #050505;
            --puck-iron: #121212;
            --puck-white: #f0f0f0;
        }

        body {
            background-color: var(--puck-black);
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            background-attachment: fixed;
            color: var(--puck-white);
            font-family: 'Oswald', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        /* The "Under-the-Grill" Glow */
        body::after {
            content: "";
            position: fixed;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 120%;
            height: 200px;
            background: radial-gradient(ellipse at bottom, var(--puck-orange) 0%, rgba(255, 34, 0, 0.4) 40%, transparent 70%);
            filter: blur(40px);
            z-index: -1;
            animation: fire-flicker 4s infinite alternate ease-in-out;
            opacity: 0.6;
        }

        @keyframes fire-flicker {
            0% { opacity: 0.4; transform: translateX(-50%) scaleY(1); }
            25% { opacity: 0.7; transform: translateX(-52%) scaleY(1.1); }
            50% { opacity: 0.5; transform: translateX(-48%) scaleY(0.9); }
            75% { opacity: 0.8; transform: translateX(-51%) scaleY(1.05); }
            100% { opacity: 0.6; transform: translateX(-50%) scaleY(1); }
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(5,5,5,0.8) 0%, rgba(5,5,5,0.95) 100%);
            z-index: -1;
        }

        .container {
            max-width: 440px;
            width: 90%;
            padding: 40px 0;
            position: relative;
            z-index: 1;
        }

        .header-section {
            margin-bottom: 40px;
            animation: heat-haze 5s infinite alternate ease-in-out;
        }

        @keyframes heat-haze {
            0% { filter: contrast(1.1) brightness(1); }
            50% { filter: contrast(1.2) brightness(1.1) drop-shadow(0 0 5px var(--puck-orange)); }
            100% { filter: contrast(1.1) brightness(1); }
        }

        .logo {
            width: 140px;
            height: 140px;
            border: 5px solid #1a1a1a;
            border-radius: 50%;
            padding: 5px;
            background: #000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            margin-bottom: 20px;
        }

        h1 { 
            font-family: 'New Rocker', cursive;
            font-size: 3.8rem;
            margin: 0;
            line-height: 1;
            color: #fff;
            letter-spacing: 2px;
            /* Sharp steel highlight instead of orange shadow */
            text-shadow: 2px 2px 0px #333, -1px -1px 0px #000;
        }

        .tagline { 
            color: var(--puck-orange);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.85rem;
            margin-top: 15px;
        }

        /* Email Capture Section */
        .email-capture {
            background: var(--puck-iron);
            padding: 30px 20px;
            margin: 40px 0;
            border: 1px solid #222;
            border-left: 5px solid var(--puck-orange);
            text-align: left;
        }

        .email-capture h3 {
            margin: 0 0 10px 0;
            text-transform: uppercase;
            font-size: 1.4rem;
            color: #fff;
        }

        .email-capture p {
            margin: 0 0 20px 0;
            font-size: 0.85rem;
            color: #888;
            line-height: 1.4;
        }

        .email-input-group {
            display: flex;
            gap: 10px;
        }

        input[type="email"] {
            flex-grow: 1;
            background: #000;
            border: 1px solid #333;
            padding: 12px;
            color: #fff;
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
        }

        .email-submit {
            background: var(--puck-orange);
            color: #fff;
            border: none;
            padding: 0 20px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Buttons Area */
        .links-section {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-top: 40px;
            padding: 0 10px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2a2a2a 0%, #111 100%);
            color: #ffffff;
            text-decoration: none;
            padding: 24px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 2px solid #333;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            box-shadow: 10px 10px 0px rgba(0,0,0,1);
            /* The Slanted Shape */
            transform: skew(-15deg);
        }

        /* Un-skewing the text and icons so they stay straight */
        .btn-content {
            display: flex;
            align-items: center;
            transform: skew(15deg);
        }

        .btn i {
            margin-right: 15px;
            font-size: 1.8rem;
            transition: all 0.3s ease;
        }

        .btn:hover { 
            transform: skew(-15deg) translate(5px, 5px);
            box-shadow: 0px 0px 0px rgba(0,0,0,0);
        }

        /* Official Brand Colors on Hover */
        .btn-youtube:hover { 
            border-color: #ff0000; 
            color: #ff0000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.2);
        }
        .btn-youtube:hover i { color: #ff0000; transform: scale(1.2); }

        .btn-tiktok:hover { 
            border-color: #00f2ea; 
            color: #00f2ea;
            box-shadow: 0 0 30px rgba(0, 242, 234, 0.2);
        }
        .btn-tiktok:hover i { color: #00f2ea; transform: scale(1.2); }

        .btn-instagram:hover { 
            border-color: #e1306c; 
            color: #e1306c;
            box-shadow: 0 0 30px rgba(225, 48, 108, 0.2);
        }
        .btn-instagram:hover i { color: #e1306c; transform: scale(1.2); }

        /* Partnership button stays rugged/iron */
        .btn-partner:hover {
            border-color: var(--puck-orange);
            color: var(--puck-orange);
        }

        /* Corner Rivets (Adjusted for skew) */
        .btn::before {
            content: "";
            position: absolute;
            top: 6px; left: 10px;
            width: 4px; height: 4px;
            background: #444;
            border-radius: 50%;
            box-shadow: 1px 1px 1px rgba(0,0,0,0.8);
        }

        /* Merch Teaser Grid */
        .merch-teaser {
            margin-top: 50px;
            padding: 30px 20px;
            border-top: 1px solid #222;
            background: rgba(255, 255, 255, 0.02);
        }

        .merch-teaser h4 {
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #666;
            margin-bottom: 25px;
            font-size: 0.8rem;
        }

        .merch-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }

        .merch-item {
            aspect-ratio: 1;
            background: linear-gradient(145deg, #151515, #0a0a0a);
            border: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: #888;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 10px;
            line-height: 1.2;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5), 
                        inset -1px -1px 2px rgba(255,255,255,0.05);
            transition: all 0.3s ease;
            position: relative;
            text-decoration: none;
        }

        .merch-item:hover {
            color: var(--puck-orange);
            border-color: var(--puck-orange);
            background: #111;
            box-shadow: 0 0 15px rgba(255, 77, 0, 0.3);
            transform: translateY(-5px);
        }

        /* Subtle "stamped" look for the text */
        .merch-item::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(255, 77, 0, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .footer { 
            margin: 60px 0; 
            opacity: 0.2; 
            font-size: 0.7rem; 
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-section">
            <img src="logo-small.png" alt="PuckCooks" class="logo">
            <h1>PuckCooks</h1>
            <span class="tagline">Feed Your Family. One Dish at a Time.</span>
        </div>

        <div class="links-section">
            <a href="https://www.youtube.com/@PuckCooks" class="btn btn-youtube"><span class="btn-content"><i class="fab fa-youtube"></i> WATCH: STEP-BY-STEP RECIPES</span></a>
            <a href="https://www.tiktok.com/@puckcooks" class="btn btn-tiktok"><span class="btn-content"><i class="fab fa-tiktok"></i> TIKTOK: THE QUICK HITS</span></a>
            <a href="https://www.instagram.com/puckcooks" class="btn btn-instagram"><span class="btn-content"><i class="fab fa-instagram"></i> INSTAGRAM: DAILY HEAT</span></a>
        </div>

        <div class="merch-teaser">
            <h4>RUGGED GEAR</h4>
            <div class="merch-grid">
                <div class="merch-item">CANVAS APRON</div>
                <a href="https://puck-aew-shop.fourthwall.com/products/flaming-hot-puckcooks-trucker-hat" class="merch-item" target="_blank">TRUCKER HAT</a>
                <div class="merch-item">HEAVY HOODIE</div>
            </div>
        </div>

        <a href="mailto:puckcooks@gmail.com" class="btn" style="margin-top: 40px; font-size: 0.8rem; opacity: 0.6;">PARTNERSHIPS & INQUIRIES</a>

        <div class="footer">
            &copy; 2026 PuckCooks. Built for the Kitchen.
        </div>
    </div>
</body>
</html>
