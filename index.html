<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PuckCooks | Feed Your Family</title>
    <!-- Rugged Hand-Painted and Strong Sans fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --puck-orange: #ff4d00; /* Flame Orange */
            --puck-black: #080808;
            --puck-iron: #1a1a1a;
        }

        body {
            background-color: var(--puck-black);
            /* Visible Cast Iron / Grit Texture using SVG filter technique */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Oswald', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* Darkening overlay to keep the grit subtle but present */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(8,8,8,0.7) 0%, rgba(8,8,8,0.9) 100%);
            z-index: -1;
        }

        .container {
            max-width: 420px;
            width: 90%;
            padding: 60px 20px;
        }

        .logo {
            width: 130px;
            height: 130px;
            margin-bottom: 25px;
            border: 4px solid #222;
            border-radius: 50%;
            padding: 5px;
            background: #000;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }

        h1 { 
            font-family: 'Permanent Marker', cursive;
            font-size: 3.8rem;
            margin: 0;
            line-height: 1;
            color: #fff;
            text-shadow: 3px 3px 0px var(--puck-orange);
            transform: rotate(-2deg); /* Adding that hand-painted vibe */
        }

        .tagline { 
            color: #aaa;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            margin-top: 15px;
            margin-bottom: 45px;
            display: block;
        }
        
        .btn {
            display: block;
            background-color: var(--puck-iron);
            color: #ffffff;
            text-decoration: none;
            padding: 22px;
            margin-bottom: 15px;
            border-radius: 2px; /* Sharper corners for a rugged look */
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid #333;
            transition: all 0.2s ease;
            box-shadow: 4px 4px 0px #000;
        }

        .btn:hover { 
            background-color: #252525;
            border-color: var(--puck-orange);
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--puck-orange);
        }

        .btn-highlight { 
            background-color: #fff; 
            color: #000; 
            border: none;
        }
        .btn-highlight:hover { background-color: var(--puck-orange); color: #fff; }

        .btn-merch {
            border: 1px dashed #444;
            background: rgba(255,255,255,0.02);
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .footer { 
            margin-top: 60px; 
            opacity: 0.3; 
            font-size: 0.7rem; 
            text-transform: uppercase;
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo-small.png" alt="PuckCooks" class="logo">
        <h1>PuckCooks</h1>
        <span class="tagline">Feed Your Family. One Dish at a Time.</span>

        <a href="https://www.youtube.com/@PuckCooks" class="btn btn-highlight">THE FULL COOK (YouTube)</a>
        <a href="https://www.instagram.com/puckcooks" class="btn">THE MARKET (Instagram)</a>
        <a href="https://www.tiktok.com/@puckcooks" class="btn">THE QUICK HITS (TikTok)</a>
        
        <a href="#" class="btn btn-merch">MERCH: RUGGED GEAR (COMING SOON)</a>
        
        <a href="mailto:puckcooks@gmail.com" class="btn">PARTNERSHIPS & INQUIRIES</a>

        <div class="footer">
            &copy; 2026 PuckCooks. Built for the Kitchen.
        </div>
    </div>
</body>
</html>
