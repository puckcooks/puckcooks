<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PuckCooks | Feed Your Family</title>
    <style>
        body {
            background-color: #0c0c0c;
            color: #ffffff;
            font-family: 'Inter', -apple-system, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 480px;
            margin: auto;
            padding: 40px 20px;
        }
        .logo {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            border: 2px solid #333;
            border-radius: 50%;
            padding: 10px;
        }
        h1 { font-weight: 800; letter-spacing: -1px; margin-bottom: 5px; }
        p { color: #888; margin-bottom: 30px; font-size: 0.9em; }
        
        .btn {
            display: block;
            background-color: #1a1a1a;
            color: #ffffff;
            text-decoration: none;
            padding: 18px;
            margin-bottom: 12px;
            border-radius: 8px;
            font-weight: 600;
            border: 1px solid #333;
            transition: all 0.2s ease;
        }
        .btn:hover { background-color: #252525; border-color: #555; }
        .btn-highlight { background-color: #ffffff; color: #000; border: none; }
        .btn-highlight:hover { background-color: #e0e0e0; }

        .footer { margin-top: 50px; opacity: 0.3; font-size: 0.7em; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Optimized logo for fast loading -->
        <img src="logo-small.png" alt="PuckCooks" class="logo">
        <h1>PuckCooks</h1>
        <p>Feeding Your Family. One Dish at a Time.</p>

        <a href="https://www.youtube.com/@PuckCooks" class="btn btn-highlight">THE FULL COOK: Step-by-Step Recipes (YouTube)</a>
        <a href="https://www.tiktok.com/t/ZP98DfTxbRHuu-bulUY/" class="btn">MY KITCHEN ESSENTIALS: The Puck Showcase</a>
        <a href="https://www.instagram.com/puckcooks" class="btn">THE MARKET: Behind the Scenes (Instagram)</a>
        <a href="https://www.tiktok.com/@puckcooks" class="btn">THE QUICK HITS: Farm-to-Table (TikTok)</a>
        <a href="mailto:puckcooks@gmail.com" class="btn">PARTNERSHIPS & INQUIRIES</a>

        <div class="footer">
            &copy; 2026 PuckCooks. Feed Your Family.
        </div>
    </div>
</body>
</html>
